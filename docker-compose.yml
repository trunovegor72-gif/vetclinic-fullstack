# Запуск всего проекта одной командой:  docker compose up --build
#
# Сервисы:
#   redis    — кэш сетки приёма врачей
#   kafka    — брокер событий (режим KRaft, без ZooKeeper — проще и быстрее)
#   backend  — Express API (ждёт готовности Kafka и Redis)
#   frontend — React-сборка за nginx (порт 8080), проксирует /api на backend
#
# После старта открыть:  http://localhost:8080

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # Официальный образ Apache Kafka (Bitnami убрала версионные теги в августе 2025).
    # apache/kafka:3.8.0 поставляется с KRaft из коробки, без ZooKeeper.
    image: apache/kafka:3.8.0
    environment:
      # --- KRaft (без ZooKeeper) ---
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Для одноузлового кластера в учебной демонстрации:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "vetclinic-cluster-01"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build: ./backend
    environment:
      KAFKA_BROKER: "kafka:9092"
      REDIS_URL: "redis://redis:6379"
      DB_PATH: "/data/vetclinic.db"
      PORT: "4000"
      TZ: "Europe/Moscow"
    volumes:
      - vetdata:/data
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  vetdata:
